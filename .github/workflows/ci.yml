name: MLflow Project CI

on: [push]

permissions:
  contents: write

jobs:
  run-ml-project:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        run: echo "Starting CI Workflow for Muhammad Restu Ilahi"

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version
          env

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn dagshub joblib matplotlib seaborn

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/mrestuilahi1405/Eksperimen_SML_Muhammad-Restu-Ilahi.mlflow
        run: |
          mlflow run . --experiment-name "CI_Workflow_Muhammad-Restu-Ilahi" --env-manager local

      - name: Get latest MLflow run_id
        id: get_run_id
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/mrestuilahi1405/Eksperimen_SML_Muhammad-Restu-Ilahi.mlflow
        run: |
          # Mengambil Run ID terbaru dari eksperimen terkait
          RUN_ID=$(mlflow runs search --experiment-names "CI_Workflow_Muhammad-Restu-Ilahi" --max-results 1 --output csv | tail -n 1 | cut -d, -f1)
          echo "LATEST_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest Run ID found: $RUN_ID"

      - name: Install Python dependencies
        run: pip install mlserver mlserver-mlflow

      - name: Upload to GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add artifacts/ || echo "No artifacts folder found"
          git commit -m "chore: update production artifacts [skip ci]" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/mrestuilahi1405/Eksperimen_SML_Muhammad-Restu-Ilahi.mlflow
        run: |
          mlflow models build-docker -m "models:/model_credit_risk/latest" -n "credit-risk-app" --enable-mlserver

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag credit-risk-app ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-app:latest
          docker tag credit-risk-app ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-app:${{ env.LATEST_RUN_ID }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-app:${{ env.LATEST_RUN_ID }}

      - name: Post Log in to Docker Hub
        run: echo "Cleaning up Docker Hub session"

      - name: Post Set up Python 3.12.7
        run: echo "Cleaning up Python environment"

      - name: Post Run actions/checkout@v3
        run: echo "Cleaning up workspace"

      - name: Complete job
        run: echo "CI Workflow Finished Successfully!"